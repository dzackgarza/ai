rules:
  # Codacy's LWC ESLint env does not include Promise as a global variable, so any
  # explicit `Promise` reference fires no-undef. The two patterns below catch the two
  # forms that appear in plugin/CLI code:
  #   1. Explicit `: Promise<X>` return-type annotations on functions
  #   2. `Promise.resolve(...)` / `Promise.reject(...)` calls in function bodies
  # Fix: remove the explicit return-type annotation (TypeScript infers it) and replace
  # Promise.resolve/reject with .then()-chain equivalents.
  - id: no-explicit-promise-return-type
    pattern: |
      function $F(...): Promise<$T> { ... }
    message: |
      Explicit `: Promise<$T>` return type triggers no-undef in Codacy's LWC ESLint
      env. Remove the annotation; TypeScript infers the return type.
    languages: [typescript]
    severity: ERROR
  - id: no-promise-global-usage
    patterns:
      - pattern: Promise.resolve(...)
      - pattern: Promise.reject(...)
      - pattern: Promise.all(...)
      - pattern: Promise.race(...)
      - pattern: new Promise(...)
    message: |
      Direct use of the Promise global triggers no-undef in Codacy's LWC ESLint env.
      Use .then()/.catch() chains from an existing thenable instead of constructing
      new Promises.
    languages: [typescript]
    severity: ERROR
  - id: no-print-statements
    pattern: print(...)
    message: Print statements should not be committed
    languages:
      - python
    severity: ERROR
  - id: no-console-log
    pattern: console.log(...)
    message: Console.log should not be committed
    languages:
      - typescript
      - javascript
    severity: ERROR
  - id: no-double-cast
    pattern: '$X as $T as $Z'
    message: |
      Double-casting (`x as T as U`) bypasses TypeScript's type system entirely.
      Use a proper type guard, mapping function, or restructure the code instead.
    languages:
      - typescript
    severity: ERROR
  - id: no-first-element-child-hydration
    pattern: '$X.firstElementChild !== null'
    message: |
      Checking `firstElementChild !== null` does NOT prove that a component mounted
      or hydrated successfully. A crash or error boundary still renders at least one
      child element. Assert semantic content specific to the component instead.
    languages:
      - typescript
    severity: ERROR
  - id: no-status-only-assertion
    pattern-either:
      - pattern: 'expect($X.status).toBe(200)'
      - pattern: 'expect($X.status()).toBe(200)'
    message: |
      HTTP status-only assertions (`.status` then `toBe(200)`) do not verify link
      validity or page content — a 200 can return error pages or empty content.
      Link checking is owned by lychee in the QC pipeline. For page content,
      assert semantic content.
    languages:
      - typescript
    severity: ERROR
  - id: rust-silenced-result
    pattern: let _ = $EXPR;
    message: |
      Using `let _ =` to silence a `Result` (or any must_use type) is a fail-fast violation.
      Handle the error explicitly with `?`, `unwrap()`, `expect()`, or pattern matching.
    languages: [rust]
    severity: ERROR
