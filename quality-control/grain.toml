[grain]
fail_on = ["OBVIOUS_COMMENT", "NAKED_EXCEPT", "HEDGE_WORD", "VAGUE_TODO", "VAGUE_COMMIT", "AND_COMMIT", "NO_CONTEXT", "GENERIC_VARNAME"]
warn_only = ["RESTATED_DOCSTRING", "SINGLE_IMPL_ABC", "BULLET_PROSE", "OBVIOUS_HEADER", "TABLE_OVERKILL", "TAG_COMMENT", "THANKS_OPENER"]
exclude = ["tests/*", "*_test.py", "test_*.py", ".git/*", "node_modules/*", "__pycache__/*", ".venv/*", "venv/*", "dist/*", "build/*"]

[grain.python]
generic_varnames = ["process_data", "handle_response", "get_result", "do_thing", "process_item", "handle_input", "get_data", "process_request"]

[grain.markdown]
hedge_words = ["robust", "seamless", "leverage", "cutting-edge", "powerful", "you might want to", "consider using", "it's worth noting", "note that"]