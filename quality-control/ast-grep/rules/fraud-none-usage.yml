id: fraud-none-usage
language: python
rule:
  any:
  - pattern: $X = None
  - pattern: return None
message: 'None usage found. This MAY be a false positive — return None in __init__
  and dunder methods is mandatory Python. MUST review: if None is used as a sentinel
  for an optional mathematical output, replace it with a precise total function or
  an explicit variant type. If None is unavoidable at a system boundary, ensure the
  call site asserts the result is not None before using it.'
severity: warning
