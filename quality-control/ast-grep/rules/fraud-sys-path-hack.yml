id: fraud-sys-path-hack
language: python
rule:
  any:
  - pattern: sys.path.insert($$$ARGS)
  - pattern: sys.path.append($$$ARGS)
  - pattern: sys.path += $X
  - pattern: sys.path = $X
  - pattern: sys.path[0] = $X
message: 'sys.path manipulation found. MUST review against the project''s auditing
  guidelines for fraud: path-hacking individual files is not a substitute for proper
  module resolution. Projects must define a canonical resolution strategy — typically
  an editable install (uv pip install -e .) in a managed venv — so all modules are
  importable without runtime path surgery.'
severity: error
