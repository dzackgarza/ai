# Global Ruff Configuration (Strict)

# Exclude a variety of commonly ignored directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Standard formatting
line-length = 88
indent-width = 4

# Target Python 3.14 (latest stable)
target-version = "py314"

[lint]
# Enable standard rules
select = ["E", "F", "I", "UP"]
# E741, UP049: see planning/README.md for justification.
# E501: ruff format is the layout authority; E501 fires only on what the
# formatter deliberately leaves alone (long string literals — schema
# descriptions, prompts, messages). Hand-wrapping strings to satisfy a width
# counter is style churn with a real risk (missing space at implicit-concat
# joins) and no slop-flagging value — line width is not a hotspot surface.
ignore = ["E741", "UP049", "E501"]

# Enforce strictness: fix everything
fixable = ["ALL"]
