exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "**/*.sage",  # Sage files have non-Python syntax that ruff cannot parse
]
line-length = 130
indent-width = 4
target-version = "py314"

# Tell ruff where to find source code for import resolution
src = ["src"]

builtins = [
    "ZZ",
    "QQ",
    "RR",
    "CC",
    "AA",
    "CDF",
    "SR",
    "var",
    "vector",
    "matrix",
    "identity_matrix",
    "zero_matrix",
    "PolynomialRing",
    "PowerSeriesRing",
    "LaurentPolynomialRing",
    "EllipticCurve",
    "Graph",
    "DiGraph",
    "CyclicPermutationGroup",
    "BilinearModule",
    "CyclicGroup",
    "IntegralLattice",
]

[lint]
select = [
    "E",
    "F",
    "I",
    "UP",
]
ignore = [
    "E743",
    "E741",
    "F403",  # star imports are allowed
]
fixable = [
    "ALL",
]
