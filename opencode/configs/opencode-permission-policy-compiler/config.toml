# OpenCode permission policy compiler configuration.
# MCP names here are resolved against ~/.config/opencode/opencode.json.
[mcps]
# MCP servers whose tools should be included in doctor/install-config inventory.
servers = ["cut-copy-paste-mcp", "serena"]

[policies.global]
read = "allow"
glob = "allow"
grep = "allow"
edit = "allow"
apply_patch = "allow"
webfetch = "allow"
websearch = "allow"
todowrite = "allow"
task = "allow"
question = "allow"
remember = "allow"
forget = "allow"
list_memories = "allow"
skill = "allow"
codesearch = "allow"
lsp = "allow"
pty_list = "allow"
pty_read = "allow"
pty_spawn = "allow"
pty_kill = "allow"
pty_write = "allow"
submit_plan = "allow"
plannotator_review = "allow"
plannotator_annotate = "allow"
write = "allow"
tokenscope = "allow"
invalid = "deny"
cut-copy-paste-mcp_cut_lines = "allow"
cut-copy-paste-mcp_copy_lines = "allow"
cut-copy-paste-mcp_paste_lines = "allow"
cut-copy-paste-mcp_get_operation_history = "allow"
cut-copy-paste-mcp_show_clipboard = "allow"
cut-copy-paste-mcp_undo_last_paste = "allow"
serena_read_file = "deny"
serena_list_dir = "deny"
serena_find_file = "deny"
serena_search_for_pattern = "deny"
serena_get_symbols_overview = "deny"
serena_find_symbol = "deny"
serena_find_referencing_symbols = "allow"
serena_create_text_file = "deny"
serena_replace_content = "deny"
serena_replace_symbol_body = "allow"
serena_insert_after_symbol = "allow"
serena_insert_before_symbol = "allow"
serena_rename_symbol = "allow"
serena_read_memory = "deny"
serena_list_memories = "deny"
serena_write_memory = "deny"
serena_edit_memory = "deny"
serena_delete_memory = "deny"
serena_rename_memory = "deny"
serena_activate_project = "allow"
serena_check_onboarding_performed = "deny"
serena_get_current_config = "deny"
serena_onboarding = "deny"
serena_prepare_for_new_conversation = "deny"
serena_initial_instructions = "deny"
serena_think_about_collected_information = "deny"
serena_think_about_task_adherence = "deny"
serena_think_about_whether_you_are_done = "deny"
serena_execute_shell_command = "deny"
serena_switch_modes = "deny"
gemini_quota = "allow"
bash = "allow"
fallback-status = "allow"
doom_loop = "ask"
compress = "allow"

[policies.global.external_directory]
"*" = "ask"
"/home/dzack/.cache/*" = "allow"
"/home/dzack/.cache/opencode-arxiv-library/*" = "allow"
"/home/dzack/.cache/opencode-webfetch/*" = "allow"
"/home/dzack/.config/agents/skills/*" = "allow"
"/home/dzack/.config/amp/skills/*" = "allow"
"/home/dzack/.config/opencode/skills/*" = "allow"
"/home/dzack/ai/*" = "allow"
"/home/dzack/.agents/*" = "allow"
"/home/dzack/.agents/skills/*" = "allow"
"/home/dzack/.claude/skills/*" = "allow"
"/home/dzack/.codex/skills/*" = "allow"
"/home/dzack/.kilocode/skills/*" = "allow"
"/home/dzack/.local/share/opencode-memory/*" = "allow"
"/home/dzack/.plannotator/*" = "allow"
"/home/dzack/.qwen/skills/*" = "allow"
"/home/dzack/pdf-extraction/*" = "allow"
"/home/dzack/pdfs/*" = "allow"
"/tmp/*" = "allow"

[policies.subagents]
task = "deny"
question = "deny"
submit_plan = "deny"
plannotator_review = "deny"
plannotator_annotate = "deny"

# Restrictive orchestration role:
# - inspect the repo with non-mutating tools
# - delegate via task
# - use memory + skills
# - edit only under the project-root .agents directory
# - use a small git-only bash allowlist
[policies.autonomous-orchestrator-only]
"*" = "deny"
read = "allow"
list = "allow"
glob = "allow"
grep = "allow"
task = "allow"
skill = "allow"
list_memories = "allow"
remember = "allow"
forget = "allow"
todowrite = "allow"
serena_activate_project = "allow"
question = "deny"
submit_plan = "deny"
plannotator_review = "deny"
plannotator_annotate = "deny"

[policies.autonomous-orchestrator-only.edit]
"*" = "deny"
".agents/*" = "allow"

[policies.autonomous-orchestrator-only.bash]
"*" = "deny"
"git" = "allow"
"git *" = "allow"
"date" = "allow"
"date *" = "allow"

[policies.autonomous-orchestrator-only.external_directory]
"*" = "deny"
"/home/dzack/ai/opencode/skills/*" = "allow"
"/home/dzack/.config/opencode/skills/*" = "allow"
"/home/dzack/.config/agents/skills/*" = "allow"
"/home/dzack/.agents/skills/*" = "allow"
"/home/dzack/.local/share/opencode-memory/*" = "allow"

