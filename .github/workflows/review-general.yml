name: General Review

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'
  push:
    branches: [main]

jobs:
  general:
    uses: ./.github/workflows/_review.yml
    permissions:
      contents: read
      security-events: write
      actions: read
    with:
      report_type: general
      scope: repo
      fail_below: ${{ vars.GENERAL_FAIL_BELOW }}
