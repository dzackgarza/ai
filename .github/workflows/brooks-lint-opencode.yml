# Brooks-Lint: code review via opencode run (free model, no API key)
name: Brooks-Lint PR Review (OpenCode)
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  brooks-lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh

      - name: Install just
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C /usr/local/bin just

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Install policy skills for skill() tool
        run: |
          mkdir -p ~/.config/opencode/skills
          for skill in anti-slop reviewing-llm-code fixing-slop policy-index test-guidelines bespoke-software-policy tool-provisioning-and-environment-hygiene; do
            [ -d "opencode/skills/$skill" ] && cp -r "opencode/skills/$skill" ~/.config/opencode/skills/
            echo "installed $skill"
          done

      - name: Run Brooks-Lint via OpenCode
        id: review
        shell: bash
        run: |
          python3 .github/workflows/brooks-lint-run.py \
            --mode review \
            --skills-dir opencode/skills \
            --template .github/workflows/brooks-review-template.md \
            --base-ref "${{ github.base_ref }}" \
            --pr-number "${{ github.event.number }}"

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        run: |
          report=$(jq -r '.report' .brooks-report-artifact.json)
          score=$(jq -r '.score // "N/A"' .brooks-report-artifact.json)
          body="## Brooks-Lint Review (OpenCode)

${report}

---
_Health Score: ${score}_"
          gh pr comment ${{ github.event.number }} --body "$body"

      - name: Check Threshold
        if: ${{ vars.BROOKS_FAIL_BELOW != '' }}
        run: |
          threshold="${{ vars.BROOKS_FAIL_BELOW }}"
          score=$(jq -r '.score // 0' .brooks-report-artifact.json)
          if [ "$score" -lt "$threshold" ] 2>/dev/null; then
            echo "Health Score $score is below threshold $threshold"
            exit 1
          fi
