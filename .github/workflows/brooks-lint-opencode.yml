# Brooks-Lint: code review via opencode run (free model, no API key)
name: Brooks-Lint PR Review (OpenCode)
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  brooks-lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout brooks-lint skills
        uses: actions/checkout@v4
        with:
          repository: hyhmrright/brooks-lint
          path: .brooks-lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install just
        run: curl -LSfs https://raw.githubusercontent.com/casey/just/main/install.sh | sh -s -- --to /usr/local/bin

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Install policy skills for skill() tool
        run: |
          mkdir -p ~/.config/opencode/skills
          for skill in anti-slop reviewing-llm-code fixing-slop policy-index test-guidelines bespoke-software-policy tool-provisioning-and-environment-hygiene; do
            [ -d "opencode/skills/$skill" ] && cp -r "opencode/skills/$skill" ~/.config/opencode/skills/
            echo "installed $skill"
          done

      - name: Run Brooks-Lint via OpenCode
        id: review
        shell: bash
        run: |
          python3 .github/workflows/brooks-lint-run.py \
            --mode review \
            --skills-dir .brooks-lint/skills \
            --template .github/workflows/brooks-review-template.md \
            --base-ref "${{ github.base_ref }}" \
            > .brooks-result.json

          echo "score=$(jq -r '.score // 0' .brooks-result.json)" >> "$GITHUB_OUTPUT"

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        run: just -f .agents/justfile post-brooks-review .brooks-result.json ${{ github.event.number }}

      - name: Check Threshold
        if: ${{ vars.BROOKS_FAIL_BELOW != '' }}
        run: |
          threshold="${{ vars.BROOKS_FAIL_BELOW }}"
          score=$(jq -r '.score // 0' .brooks-result.json)
          if [ "$score" -lt "$threshold" ] 2>/dev/null; then
            echo "Health Score $score is below threshold $threshold"
            exit 1
          fi
