# Slop-Lint: AI-generated-code slop review via opencode run (free model, no API key)
name: Slop-Lint PR Review (OpenCode)
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  slop-lint:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Checkout brooks-lint skills
        uses: actions/checkout@v4
        with:
          repository: hyhmrright/brooks-lint
          path: .brooks-lint

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh

      - name: Install just
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C /usr/local/bin just

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Install policy skills for skill() tool
        run: |
          mkdir -p ~/.config/opencode/skills
          for skill in anti-slop reviewing-llm-code fixing-slop policy-index test-guidelines bespoke-software-policy tool-provisioning-and-environment-hygiene; do
            [ -d "opencode/skills/$skill" ] && cp -r "opencode/skills/$skill" ~/.config/opencode/skills/
            echo "installed $skill"
          done

      - name: Run Slop-Lint via OpenCode
        id: review
        shell: bash
        run: |
          python3 .github/workflows/brooks-lint-run.py \
            --mode slop \
            --skills-dir .brooks-lint/skills \
            --template .github/workflows/slop-review-template.md \
            --base-ref "${{ github.base_ref }}" \
            > .slop-result.json

          echo "score=$(jq -r '.score // 0' .slop-result.json)" >> "$GITHUB_OUTPUT"

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        run: just -f .agents/justfile post-brooks-review .slop-result.json ${{ github.event.number }}

      - name: Check Slop Threshold
        if: ${{ vars.SLOP_FAIL_BELOW != '' }}
        run: |
          threshold="${{ vars.SLOP_FAIL_BELOW }}"
          score=$(jq -r '.score // 0' .slop-result.json)
          if [ "$score" -lt "$threshold" ] 2>/dev/null; then
            echo "Slop Health Score $score is below threshold $threshold"
            exit 1
          fi
