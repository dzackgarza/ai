# Gardener: PR review thread index and discussion maintenance
# Runs as a standard PR check alongside reviews. On first push no
# threads exist yet — it finds nothing to do. On synchronize it
# catches up on accumulated threads.
name: Review Thread Gardener

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'Pull request number to garden'
        required: true
        type: number

jobs:
  garden:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr-number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Fetch PR discussion state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run quality-control/ci/fetch-pr-discussion.py \
            --pr-number ${{ steps.pr.outputs.number }} \
            --repo ${{ github.repository }} \
            --output .gardener-context.md

      - name: Prepare gardener task
        run: |
          cat quality-control/reviews/gardener/task.md .gardener-context.md > .gardener-task.md
          echo "" >> .gardener-task.md
          echo "---END CONTEXT---" >> .gardener-task.md

      - name: Run gardener agent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          opencode run --model opencode/deepseek-v4-flash-free < .gardener-task.md
