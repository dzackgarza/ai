# Gardener: PR review thread index and discussion maintenance
# Runs after review comments and bot comments exist.
name: Review Thread Gardener

on:
  workflow_run:
    workflows:
      - General Review (OpenCode)
      - Slop Review (OpenCode)
    types:
      - completed
  workflow_dispatch:
    inputs:
      pr-number:
        description: 'Pull request number to garden'
        required: true
        type: number
  issue_comment:
    types: [created]

jobs:
  garden:
    if: |
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'workflow_run' ||
      (github.event_name == 'issue_comment' &&
       contains(github.event.comment.body, '/garden-review-threads') &&
       github.event.issue.pull_request != '')
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Determine PR number
        id: pr
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ github.event.inputs.pr-number }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "number=${{ github.event.workflow_run.pull_requests[0].number }}" >> $GITHUB_OUTPUT
          else
            echo "number=${{ github.event.issue.number }}" >> $GITHUB_OUTPUT
          fi

      - name: Fetch PR discussion state
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run quality-control/ci/fetch-pr-discussion.py \
            --pr-number ${{ steps.pr.outputs.number }} \
            --repo ${{ github.repository }} \
            --output .gardener-context.md

      - name: Prepare gardener task
        run: |
          cat quality-control/reviews/gardener/task.md .gardener-context.md > .gardener-task.md
          echo "" >> .gardener-task.md
          echo "---END CONTEXT---" >> .gardener-task.md

      - name: Run gardener agent
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          opencode run --model opencode/deepseek-v4-flash-free < .gardener-task.md
