# General Review: repo-wide code audit via opencode run (free model, no API key)
name: General Review (OpenCode)
on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1' # weekly Monday 08:00
  push:
    branches: [main]

jobs:
  general-review:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh

      - name: Install just
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C /usr/local/bin just

      - name: Block just — agent may not run it
        run: |
          rm -f /usr/local/bin/just
          cp quality-control/ci/just-blocked.sh /usr/local/bin/just
          chmod 755 /usr/local/bin/just

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Install CC Safety Net
        run: npm install -g cc-safety-net

      - name: Configure OpenCode and CC Safety Net
        run: |
          mkdir -p ~/.config/opencode
          cp quality-control/ci-opencode.json ~/.config/opencode/opencode.json
          mkdir -p ~/.config/opencode/skills
          for skill in policy-index test-guidelines bespoke-software-policy tool-provisioning-and-environment-hygiene; do
            [ -d "opencode/skills/$skill" ] && cp -r "opencode/skills/$skill" ~/.config/opencode/skills/
            echo "installed $skill"
          done
          mkdir -p .cc-safety-net/rules/project-rules
          cp quality-control/ci-cc-safety-net-rules.json .cc-safety-net/rules/rule.json
          cp quality-control/ci-cc-safety-net.json .cc-safety-net/rules/project-rules/rulebook.json
          npx -y cc-safety-net rule sync
        env:
          CC_SAFETY_NET_PARANOID: 1

      - name: Fetch reviewer context (existing alerts)
        id: ctx
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          uv run quality-control/ci/fetch-reviewer-context.py \
            --repo ${{ github.repository }} \
            --categories ai-general-review \
            --output .reviewer-context.md

      - name: Prepare reviewer sandbox and lock validation
        run: |
          sudo useradd -m -s /bin/bash reviewer || true

          mkdir -p .agents/review-runner/candidates
          sudo chown -R reviewer:reviewer .agents

          sudo chown root:root quality-control/ci/submit-candidate
          sudo chmod 755 quality-control/ci/submit-candidate

          sudo chown -R root:root quality-control/ci/locked
          sudo chmod 700 quality-control/ci/locked
          sudo chmod 500 quality-control/ci/locked/submit-candidate
          sudo chmod 400 quality-control/ci/locked/check-report.py

          LOCKED_SUBMIT="$(pwd)/quality-control/ci/locked/submit-candidate"
          {
            echo "reviewer ALL=(root) NOPASSWD: $LOCKED_SUBMIT"
            echo "reviewer ALL=(root) NOPASSWD: $LOCKED_SUBMIT *"
            echo "Defaults!$LOCKED_SUBMIT env_keep += \"REPORT_TYPE\""
          } | sudo tee /etc/sudoers.d/review-submit
          sudo chmod 0440 /etc/sudoers.d/review-submit
          sudo visudo -c

          sudo find . -name justfile -type f -exec chmod 000 {} +

      - name: Run General Review via OpenCode
        id: review
        shell: bash
        env:
          REPORT_TYPE: general
        run: |
          sudo -u reviewer -E python3 quality-control/run-review.py \
            --mode review \
            --skills-dir opencode/skills \
            --template quality-control/reviews/general/template.md \
            --base-ref "${{ github.base_ref }}" \
            --pr-number "${{ github.event.number }}" \
            --reviewer-context .reviewer-context.md

      - name: Convert review report to SARIF
        run: |
          sudo uv run quality-control/ci/locked/check-report.py metadata .review-report-artifact.json
          uv run quality-control/ci/report-to-sarif.py \
            --artifact .review-report-artifact.json \
            --output .review-report.sarif

      - name: Upload review findings
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .review-report.sarif
          category: ai-general-review

      - name: Check Threshold
        if: ${{ vars.GENERAL_FAIL_BELOW != '' }}
        run: |
          threshold="${{ vars.GENERAL_FAIL_BELOW }}"
          tier1=$(jq '[.findings[] | select(.tier == "tier1")] | length' .review-report-artifact.json)
          tier2=$(jq '[.findings[] | select(.tier == "tier2")] | length' .review-report-artifact.json)
          score=$((100 - tier1 * 20 - tier2 * 5))
          [ "$score" -lt 0 ] && score=0
          if [ "$score" -lt "$threshold" ] 2>/dev/null; then
            echo "Health Score $score is below threshold $threshold"
            exit 1
          fi
