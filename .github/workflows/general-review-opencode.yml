name: General Review (OpenCode)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'
  push:
    branches: [main]

jobs:
  general-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: bash quality-control/ci/steps/install-tools.sh

      - name: Configure reviewer tools
        run: bash quality-control/ci/steps/configure-general.sh

      - name: Fetch reviewer context
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: bash quality-control/ci/steps/fetch-context.sh ai-general-review .reviewer-context.md

      - name: Prepare reviewer
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: bash quality-control/ci/steps/prepare-reviewer.sh

      - name: Run General Review
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_SHA: ${{ github.sha }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          bash quality-control/ci/steps/run-review.sh \
            review \
            quality-control/reviews/general/template.md \
            general

      - name: Collect review output
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: bash quality-control/ci/steps/collect-review-output.sh

      - name: Convert report to SARIF
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: bash quality-control/ci/steps/convert-sarif.sh ai-general-review

      - name: Upload review findings
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .review-report.sarif
          category: ai-general-review

      - name: Check Threshold
        if: ${{ vars.GENERAL_FAIL_BELOW != '' }}
        run: |
          threshold="${{ vars.GENERAL_FAIL_BELOW }}"
          tier1=$(jq '[.findings[] | select(.tier == "tier1")] | length' .review-report-artifact.json)
          tier2=$(jq '[.findings[] | select(.tier == "tier2")] | length' .review-report-artifact.json)
          score=$((100 - tier1 * 20 - tier2 * 5))
          [ "$score" -lt 0 ] && score=0
          if [ "$score" -lt "$threshold" ] 2>/dev/null; then
            echo "Health Score $score is below threshold $threshold"
            exit 1
          fi
