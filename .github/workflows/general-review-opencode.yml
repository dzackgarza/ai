name: General Review (OpenCode)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 1'
  push:
    branches: [main]

jobs:
  general-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
      actions: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install just for runner
        run: |
          mkdir -p "$RUNNER_TEMP/bin"
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C "$RUNNER_TEMP/bin" just
          echo "$RUNNER_TEMP/bin" >> "$GITHUB_PATH"

      - name: Install tools
        run: just -f quality-control/ci/runner.just install-tools

      - name: Fetch reviewer context
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: just -f quality-control/ci/runner.just fetch-context ai-general-review .reviewer-context.md

      - name: Prepare reviewer
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: just -f quality-control/ci/runner.just prepare-general

      - name: Run General Review
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          just -f quality-control/ci/runner.just run-review \
            review \
            quality-control/reviews/general/template.md \
            general

      - name: Collect review output
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: just -f quality-control/ci/runner.just collect-output

      - name: Convert report to SARIF
        run: just -f quality-control/ci/runner.just convert-sarif ai-general-review

      - name: Upload review findings
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: .review-report.sarif
          category: ai-general-review

      - name: Check Threshold
        if: ${{ vars.GENERAL_FAIL_BELOW != '' }}
        run: |
          threshold="${{ vars.GENERAL_FAIL_BELOW }}"
          tier1=$(jq '[.findings[] | select(.tier == "tier1")] | length' .review-report-artifact.json)
          tier2=$(jq '[.findings[] | select(.tier == "tier2")] | length' .review-report-artifact.json)
          score=$((100 - tier1 * 20 - tier2 * 5))
          [ "$score" -lt 0 ] && score=0
          if [ "$score" -lt "$threshold" ] 2>/dev/null; then
            echo "Health Score $score is below threshold $threshold"
            exit 1
          fi
