# General Review: code review via opencode run (free model, no API key)
name: General Review (OpenCode)
on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  general-review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | env UV_INSTALL_DIR=/usr/local/bin sh

      - name: Install just
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C /usr/local/bin just

      - name: Block just — agent may not run it
        run: |
          rm -f /usr/local/bin/just
          cp quality-control/ci/just-blocked.sh /usr/local/bin/just
          chmod 755 /usr/local/bin/just

      - name: Install OpenCode
        run: npm install -g opencode-ai

      - name: Install CC Safety Net
        run: npm install -g cc-safety-net

      - name: Configure OpenCode and CC Safety Net
        run: |
          # OpenCode global config — enable cc-safety-net plugin
          mkdir -p ~/.config/opencode
          cp quality-control/ci-opencode.json ~/.config/opencode/opencode.json
          # Copy policy skills for skill() tool
          mkdir -p ~/.config/opencode/skills
          for skill in policy-index test-guidelines bespoke-software-policy tool-provisioning-and-environment-hygiene; do
            [ -d "opencode/skills/$skill" ] && cp -r "opencode/skills/$skill" ~/.config/opencode/skills/
            echo "installed $skill"
          done
          # CC Safety Net project rules — block linting escapes (uvx ruff, uvx mypy, etc.)
          mkdir -p .cc-safety-net/rules/project-rules
          cp quality-control/ci-cc-safety-net-rules.json .cc-safety-net/rules/rule.json
          cp quality-control/ci-cc-safety-net.json .cc-safety-net/rules/project-rules/rulebook.json
          npx -y cc-safety-net rule sync
        env:
          CC_SAFETY_NET_PARANOID: 1

      - name: Lockdown CI assets
        run: |
          sudo chown -R root:root quality-control/ci/
          chmod -R 700 quality-control/ci/
          chmod 755 quality-control/ci/
          chmod 755 quality-control/ci/submit-candidate
          find . -name justfile -type f -exec chmod 000 {} +

      - name: Run General Review via OpenCode
        id: review
        shell: bash
        env:
          REPORT_TYPE: general
        run: |
          python3 quality-control/run-review.py \
            --mode review \
            --skills-dir opencode/skills \
            --template quality-control/reviews/general/template.md \
            --base-ref "${{ github.base_ref }}" \
            --pr-number "${{ github.event.number }}"

      - name: Post PR Comment
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          report=$(cat .review-report-artifact.md)
          score=$(cat .review-report-score.txt)
          body=$(printf '## General Review (OpenCode)\n\n%s\n\n---\n_Health Score: %s_' "$report" "$score")
          gh pr comment ${{ github.event.number }} --body "$body"

      - name: Check Threshold
        if: ${{ vars.GENERAL_FAIL_BELOW != '' }}
        run: |
          threshold="${{ vars.GENERAL_FAIL_BELOW }}"
          score=$(cat .review-report-score.txt)
          if [ "$score" -lt "$threshold" ] 2>/dev/null; then
            echo "Health Score $score is below threshold $threshold"
            exit 1
          fi
