name: Slop Review (OpenCode)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 4'
  push:
    branches: [main]

jobs:
  slop-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install tools
        run: |
          VERSION=$(curl -sL https://api.github.com/repos/casey/just/releases/latest | jq -r '.tag_name')
          curl -sL "https://github.com/casey/just/releases/download/${VERSION}/just-${VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xzf - -C /usr/local/bin just
          just -f quality-control/ci/justfile install-tools

      - name: Configure reviewer tools
        run: just -f quality-control/ci/justfile configure-slop

      - name: Fetch reviewer context
        env:
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: just -f quality-control/ci/justfile fetch-context ai-slop-review .reviewer-context.md

      - name: Prepare reviewer
        run: just -f quality-control/ci/justfile prepare-reviewer

      - name: Run Slop Review
        env:
          GITHUB_BASE_REF: ${{ github.base_ref }}
          PR_NUMBER: ${{ github.event.number }}
        run: |
          just -f quality-control/ci/justfile run-review \
            slop \
            quality-control/reviews/slop/template.md \
            slop

      - name: Collect review output
        run: just -f quality-control/ci/justfile collect-review-output

      - name: Convert report to SARIF
        run: just -f quality-control/ci/justfile convert-sarif ai-slop-review

      - name: Upload review findings
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: .review-report.sarif
          category: ai-slop-review

      - name: Check Slop Threshold
        if: ${{ vars.SLOP_FAIL_BELOW != '' }}
        run: |
          threshold="${{ vars.SLOP_FAIL_BELOW }}"
          tier1=$(jq '[.findings[] | select(.tier == "tier1")] | length' .review-report-artifact.json)
          tier2=$(jq '[.findings[] | select(.tier == "tier2")] | length' .review-report-artifact.json)
          score=$((100 - tier1 * 20 - tier2 * 5))
          [ "$score" -lt 0 ] && score=0
          if [ "$score" -lt "$threshold" ] 2>/dev/null; then
            echo "Slop Health Score $score is below threshold $threshold"
            exit 1
          fi
