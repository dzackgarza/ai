# Reduce escape-time so Esc isn't swallowed over SSH
set -sg escape-time 10

# Enable mouse support
set -g mouse on

# Enable hyperlinks
set -as terminal-features ",*:hyperlinks"

# Increase scrollback buffer
set -g history-limit 100000

# Better colors
set -g default-terminal "screen-256color"

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# Focus events
set -g focus-events on

# Bindings
# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation: Ctrl+Tab after prefix
bind C-Tab next-window
bind C-S-Tab previous-window

# Window navigation with ) and ( after prefix
bind ) next-window
bind ( previous-window

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'thewtex/tmux-mem-cpu-load'
set -g @plugin 'tmux-powerline/tmux-powerline'

# Status bar refresh interval
set -g status-interval 2

# Initialize TPM (keep at bottom of tmux.conf)
run '~/.config/tmux/plugins/tpm/tpm'

# Right side: rainbarf + tmux-mem-cpu-load (set AFTER tmux-powerline to override)
set -g status-right '#[fg=green]#($HOME/perl5/bin/rainbarf --rgb)#[default] | #($TMUX_PLUGIN_MANAGER_PATH/tmux-mem-cpu-load/tmux-mem-cpu-load --colors --powerline-right --interval 2) | %H:%M'
set -g status-right-length 200
