# Reduce escape-time so Esc isn't swallowed over SSH
set -sg escape-time 10

# Enable mouse support
set -g mouse on

# Enable hyperlinks
set -as terminal-features ',*:hyperlinks'

# Increase scrollback buffer
set -g history-limit 100000

# Better colors
set -g default-terminal "screen-256color"
# Enable RGB/hex color support in tmux
set -as terminal-features ',screen-256color:RGB'

# Activity monitoring
setw -g monitor-activity off
set -g visual-activity off

# Focus events
set -g focus-events on

# Bindings
# Split panes using | and -
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# Vim-like pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Resize panes
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Window navigation: Ctrl+Tab after prefix
bind C-Tab next-window
bind C-S-Tab previous-window

# Window navigation with ) and ( after prefix
bind ) next-window
bind ( previous-window

# Status bar refresh interval
set -g status-interval 2

# TPM (Tmux Plugin Manager)
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-cpu'
set -g @plugin 'tmux-powerline/tmux-powerline'

# tmux-cpu settings
set -g @cpu_low_bg_color '#a6d189'    # green when CPU < 30%
set -g @cpu_medium_bg_color '#e5c890' # yellow when CPU 30-60%
set -g @cpu_high_bg_color '#e78284'   # red when CPU > 60%
set -g @cpu_low_icon ' '             # CPU icon low load
set -g @cpu_medium_icon ' '          # CPU icon medium load
set -g @cpu_high_icon ' '            # CPU icon high load

set -g @ram_low_icon ' '             # RAM icon low load
set -g @ram_medium_icon ' '          # RAM icon medium load  
set -g @ram_high_icon ' '            # RAM icon high load

# Initialize TPM (keep at bottom of tmux.conf)
set-environment -g TMUX_PLUGIN_MANAGER_PATH '~/.config/tmux/plugins/'
run '~/.config/tmux/plugins/tpm/tpm'

# Load tmux-cpu after TPM
run-shell '~/.config/tmux/plugins/tmux-cpu/cpu.tmux'
