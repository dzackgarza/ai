# Global Ruff Configuration

# Exclude a variety of commonly ignored directories
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
]

# Same as Black
line-length = 88
indent-width = 4

# Assume Python 3.10+
target-version = "py310"

[lint]
# Enable standard rules (E=pycodestyle, F=pyflakes, I=isort, UP=pyupgrade)
select = ["E", "F", "I", "UP"]
ignore = []

# Allow fixable rules (except for F841: unused variables)
fixable = ["ALL"]
unfixable = ["F841"]

# Allow unused variables when underscore-prefixed.
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"
