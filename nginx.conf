# How to configure SearXNG for local access.

worker_processes auto;
error_log /var/log/nginx/error.log;
pid /run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;

    # Rate limiting zone (optional)
    # limit_req_zone $binary_remote_addr zone=ntfy_limit:10m rate=45r/m;

    # Main server on port 80
    server {
        listen 80;
        server_name _;

        # SearXNG endpoint (uWSGI socket)
        location /searxng {
            uwsgi_pass unix:///usr/local/searxng/run/socket;
            include uwsgi_params;
            uwsgi_param HTTP_HOST $host;
            uwsgi_param HTTP_CONNECTION $http_connection;
            uwsgi_param HTTP_X_FORWARDED_PROTO $scheme;
            uwsgi_param HTTP_X_SCRIPT_NAME /searxng;
            uwsgi_param HTTP_X_REAL_IP $remote_addr;
            uwsgi_param HTTP_X_FORWARDED_FOR $proxy_add_x_forwarded_for;
        }

        # SearXNG static files (optional)
        location /searxng/static/ {
            alias /usr/local/searxng/searxng-src/searx/static/;
        }

        # ntfy proxy to port 81
        location /ntfy {
            proxy_pass http://127.0.0.1:81;
            proxy_http_version 1.1;

            # Disable buffering for SSE/WebSocket support
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_redirect off;

            # Required headers for WebSocket upgrade
            proxy_set_header Host $http_host;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Timeout settings
            proxy_connect_timeout 3m;
            proxy_send_timeout 3m;
            proxy_read_timeout 3m;

            # Stream request body to backend (for attachments)
            client_max_body_size 0;

            # Optional rate limiting
            # limit_req zone=ntfy_limit burst=1000 nodelay;
        }
    }
}
