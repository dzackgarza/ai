# Centralized MCP Server Configuration
# =====================================
# This file is the single source of truth for all MCP server configurations.
# Run `python3 mcp/sync_mcp_configs.py` to propagate changes to all harnesses.
#
# Quick Start with OpenCode:
# 1. Configure OpenCode - Add the plugin and Cursor provider to your opencode.json:
#    {
#      "$schema": "https://opencode.ai/config.json",
#      "plugin": ["yet-another-opencode-cursor-auth@latest"],
#      "provider": {"cursor": {"name": "Cursor"}}
#    }

# MCP Servers that should be configured in ALL harnesses
common:
  serena:
    description: "Semantic code editing and navigation"
    command: "uvx"
    args:
      - "--from"
      - "git+https://github.com/oraios/serena"
      - "serena"
      - "start-mcp-server"
      - "--project-from-cwd"
    enabled: true

  context7:
    description: "Library documentation via Context7"
    command: "npx"
    args:
      - "-y"
      - "@upstash/context7-mcp"
    enabled: true

  cut-copy-paste-mcp:
    description: "Cross-session clipboard operations"
    command: "npx"
    args:
      - "-y"
      - "@fastmcp-me/cut-copy-paste-mcp"
    enabled: true

  deepwiki-mcp:
    description: "Fetch documentation from DeepWiki (official server)"
    type: "remote"
    url: "https://mcp.deepwiki.com/mcp"
    enabled: true

  searxng-mcp:
    description: "Web search via local SearXNG instance (uses SEARXNG_SERVER_URL from ~/.envrc)"
    command: "npx"
    args:
      - "-y"
      - "mcp-searxng"
    env:
      SEARXNG_URL: "{env:SEARXNG_SERVER_URL}"
    enabled: true
    exclude_harnesses:
      - opencode

  improved-webtools:
    description: "Web search and fetching via improved-webtools MCP server"
    command: "uv"
    args:
      - "run"
      - "fastmcp"
      - "run"
      - "/home/dzack/opencode-plugins/improved-webtools/mcp-server/server.py"
    enabled: true
    exclude_harnesses:
      - opencode

# Harnesses to sync (set enabled: false to skip a harness)
harnesses:
  opencode:
    enabled: true
    config_path: "~/ai/opencode/opencode.json"
    format: "json"
    json_path: "mcp"  # JSON path within the config

  codex:
    enabled: true
    config_path: "~/.codex/config.toml"
    format: "toml"
    toml_section: "mcp_servers"

  amp:
    enabled: true
    config_path: "~/.config/amp/settings.json"
    format: "json"
    json_path: "amp.mcpServers"

  claude:
    enabled: true
    config_path: "~/.claude.json"
    format: "json"
    json_path: "mcpServers"

  qwen:
    enabled: true
    config_path: "~/.qwen/settings.json"
    format: "json"
    json_path: "mcpServers"

# Kilo reads from ~/.opencode/opencode.json which is symlinked to ~/ai/opencode/opencode.json
# No separate harness needed
