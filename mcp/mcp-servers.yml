common:
  serena:
    description: Semantic code editing and navigation
    command: uvx
    args:
    - --from
    - git+https://github.com/oraios/serena
    - serena
    - start-mcp-server
    - --project-from-cwd
    enabled: true
  cut-copy-paste-mcp:
    description: Cross-session clipboard operations
    command: npx
    args:
    - -y
    - '@fastmcp-me/cut-copy-paste-mcp'
    enabled: true
  improved-webtools:
    description: Web search and fetching via improved-webtools MCP server
    command: /home/dzack/opencode-plugins/opencode-plugin-improved-webtools/mcp-server/.venv/bin/python
    args:
    - /home/dzack/opencode-plugins/opencode-plugin-improved-webtools/mcp-server/server.py
    enabled: true
    exclude_harnesses:
    - opencode
    env:
      SEARXNG_INSTANCE_URL: '{env:SEARXNG_INSTANCE_URL}'
harnesses:
  opencode:
    enabled: true
    config_path: ~/ai/opencode/opencode.json
    format: json
    json_path: mcp
  codex:
    enabled: true
    config_path: ~/.codex/config.toml
    format: toml
    toml_section: mcp_servers
  amp:
    enabled: true
    config_path: ~/.config/amp/settings.json
    format: json
    json_path: amp.mcpServers
  claude:
    enabled: true
    config_path: ~/.claude.json
    format: json
    json_path: mcpServers
  qwen:
    enabled: true
    config_path: ~/.qwen/settings.json
    format: json
    json_path: mcpServers
