common:
  sdl-mcp:
    description: SDL MCP server
    command: npx
    args:
    - -y
    - sdl-mcp
    - serve
    - --stdio
    enabled: true
    env:
      SDL_CONFIG: /home/dzack/ai/mcp/sdlmcp.config.json
  improved-webtools:
    description: Web search and fetching via improved-webtools MCP server
    command: uv
    args:
    - run
    - --directory
    - /home/dzack/opencode-plugins/opencode-plugin-improved-webtools/mcp-server
    - python
    - server.py
    enabled: true
    exclude_harnesses:
    - opencode
    env:
      SEARXNG_INSTANCE_URL: '{env:SEARXNG_INSTANCE_URL}'
harnesses:
  opencode:
    enabled: true
    config_path: ~/ai/opencode/opencode.json
    format: json
    json_path: mcp
  codex:
    enabled: true
    config_path: ~/.codex/config.toml
    format: toml
    toml_section: mcp_servers
  amp:
    enabled: true
    config_path: ~/.config/amp/settings.json
    format: json
    json_path: amp.mcpServers
  claude:
    enabled: true
    config_path: ~/.claude.json
    format: json
    json_path: mcpServers
  qwen:
    enabled: true
    config_path: ~/.qwen/settings.json
    format: json
    json_path: mcpServers
  gemini:
    enabled: true
    config_path: ~/.gemini/settings.json
    format: json
    json_path: mcpServers
  antigravity-cli:
    enabled: true
    config_path: ~/.gemini/antigravity-cli/mcp_config.json
    format: json
    json_path: mcpServers
