notes: |
  Score-band guide (agentic capabilities), calibrated against SWE-bench:
  - 90-100: Elite frontier coders (Claude Opus 4.x, GPT-5.x) — best for complex real-world tasks and refactors
  - 82-89: S+ SWE-bench (70%+) — GLM 5, Kimi K2.5, MiniMax M2.1, DeepSeek V3.2; strong agentic performers
  - 72-81: S SWE-bench (60-70%) — MiniMax M2, DeepSeek V3.1, Qwen3.5; capable with some supervision
  - 62-71: A+ SWE-bench (50-60%) — Mistral Large, Nemotron Ultra; solid alternatives
  - 52-61: A SWE-bench (40-50%) — Nemotron Nano, Qwen Coder, Gemma 3; good for targeted tasks
  - 42-51: A- SWE-bench (35-40%) — Llama 3.3 70B; lightweight or constrained infra
  - 35-41: B+ SWE-bench (30-35%) — Ministral, Mixtral; code completion on limited infra
  - 25-34: B/C SWE-bench (<30%) — R1 Distill, Phi, Gemma 2; minimal agentic capability
