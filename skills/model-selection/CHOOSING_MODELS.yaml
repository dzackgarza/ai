scoring_target: agentic capabilities (0-100) - calibrated against APEX Testing ELO
testing_command: |
  opencode run --attach http://127.0.0.1:4096 --dir /home/dzack/lattice_interface -m <model_slug> --thinking --print-logs "Say hello and exit."
notes: |
  Score-band guide (agentic capabilities), calibrated against APEX Testing ELO:
  - 95-100: S+ tier (ELO ≥1870) — Claude Opus 4.6, Sonnet 4.6, GPT 5.2; elite for complex real-world tasks
  - 85-94: S tier (ELO 1800-1870) — Claude 4.5, GPT 5.1, Gemini 3 Pro; strong frontier coders
  - 75-84: A+ tier (ELO 1750-1800) — Gemini 3 Flash, MiniMax M2.1, Kimi K2.5; excellent alternatives
  - 65-74: A tier (ELO 1700-1750) — Claude 4 Haiku, Gemini 2.5 Pro, DeepSeek V3.1; solid performers
  - 55-64: A- tier (ELO 1650-1700) — Gemini 2.5 Flash, Llama 4 Maverick; good for targeted tasks
  - 45-54: B+ tier (ELO 1600-1650) — Devstral, Gemma 3, Mixtral; lightweight infra
  - 30-44: B tier (ELO 1500-1600) — Qwen Coder, R1 Distill, Phi; minimal agentic capability
  - <30: C tier (<1500 ELO) — Legacy models, basic code completion only

  APEX Testing better reflects real-world capability than SWE-bench (which rates Gemini Flash 3 nearly equal to Opus 4.6).
