type: feature
displayName: Feature
displayNamePlural: Features
icon: rocket_launch
color: '#10b981'
modes:
  inline: true
  fullDocument: true
sync:
  mode: shared
  scope: project
idPrefix: FEATURE
idFormat: ulid
fields:
- name: id
  type: string
  readOnly: true
  displayInline: false
- name: parents
  type: array
  itemType: string
  displayInline: false
- name: dependsOn
  type: array
  itemType: string
  displayInline: false
- name: plans
  type: array
  itemType: string
  displayInline: false
- name: title
  type: string
  required: true
- name: status
  type: select
  default: unstarted
  options:
  - value: unstarted
    label: Unstarted
    icon: circle
  - value: in-progress
    label: In Progress
    icon: motion_photos_on
  - value: needs-review
    label: Needs Review
    icon: rate_review
    color: '#3b82f6'
  - value: done
    label: Done
    icon: check_circle
- name: priority
  type: select
  options:
  - value: low
    label: Low
  - value: medium
    label: Medium
  - value: high
    label: High
  - value: critical
    label: Critical
- name: owner
  type: user
- name: description
  type: text
- name: releaseVersion
  type: string
  displayInline: true
- name: releaseNotes
  type: text
- name: tags
  type: array
  itemType: string
  displayInline: false
inlineTemplate: '{icon} {title} {status} {releaseVersion}'
roles:
  title: title
  workflowStatus: status
  priority: priority
  assignee: owner
  tags: tags
