type: spec
displayName: Spec
displayNamePlural: Specs
icon: description
color: '#06b6d4'
modes:
  inline: true
  fullDocument: true
idPrefix: SPEC
fields:
- name: id
  type: string
  readOnly: true
  displayInline: false
- name: parents
  type: array
  itemType: string
  displayInline: false
- name: dependsOn
  type: array
  itemType: string
  displayInline: false
- name: title
  type: string
  required: true
- name: status
  type: select
  default: unstarted
  options:
  - value: unstarted
    label: Unstarted
    icon: circle
  - value: in-progress
    label: In Progress
    icon: motion_photos_on
  - value: needs-review
    label: Needs Review
    icon: rate_review
    color: '#3b82f6'
  - value: needs-human-input
    label: Needs Human Input
    icon: person
    color: '#8b5cf6'
  - value: complete
    label: Complete
    icon: check_circle
  - value: revision-required
    label: Revision Required
    icon: replay
    color: '#f59e0b'
  - value: blocked
    label: Blocked
    icon: block
    color: '#dc2626'
- name: blocked_reason
  type: text
  displayInline: false
- name: priority
  type: select
  options:
  - value: low
    label: Low
  - value: medium
    label: Medium
  - value: high
    label: High
  - value: critical
    label: Critical
- name: complexity
  type: number
  min: 0
  max: 100
- name: requirement
  type: text
- name: acceptanceCriteria
  type: array
  itemType: string
- name: tags
  type: array
  itemType: string
  displayInline: false
inlineTemplate: '{icon} {title} {status} {priority}'
roles:
  title: title
  workflowStatus: status
  priority: priority
  tags: tags
