type: plan
displayName: Plan
displayNamePlural: Plans
icon: edit_note
color: '#3b82f6'
modes:
  inline: true
  fullDocument: true
idPrefix: PLAN
idFormat: ulid
fields:
- name: id
  type: string
  readOnly: true
  displayInline: false
- name: parents
  type: array
  itemType: string
  displayInline: false
  required: true
- name: dependsOn
  type: array
  itemType: string
  displayInline: false
- name: blocks
  type: array
  itemType: string
  displayInline: false
- name: title
  type: string
  required: true
  displayInline: true
- name: status
  type: select
  required: true
  default: needs-review
  options:
  - value: needs-review
    label: Needs Review
    icon: edit_note
    color: '#64748b'
  - value: approved-and-unstarted
    label: Approved and Unstarted
    icon: check_circle
    color: '#22c55e'
  - value: in-progress
    label: In Progress
    icon: construction
    color: '#f59e0b'
  - value: complete
    label: Complete
    icon: task_alt
    color: '#10b981'
  - value: blocked
    label: Blocked
    icon: block
    color: '#dc2626'
- name: tags
  type: array
  itemType: string
  displayInline: false
- name: description
  type: text
  required: true
- name: successCriteria
  type: array
  itemType: string
  required: true
- name: phases
  type: array
  itemType: string
  displayInline: false
- name: tasks
  type: array
  itemType: string
  displayInline: false
statusBarLayout:
- row:
  - field: status
    width: 200
- row:
  - field: owner
    width: 200
  - field: tags
    width: auto
inlineTemplate: '{icon} {title} {status} {owner}'
tableView:
  defaultColumns:
  - title
  - status
  - owner
  filterable: true
  exportable: true
roles:
  title: title
  workflowStatus: status
  tags: tags
