type: plan
displayName: Plan
displayNamePlural: Plans
icon: edit_note
color: '#3b82f6'
modes:
  inline: true
  fullDocument: true
idPrefix: PLAN
idFormat: ulid
fields:
- name: id
  type: string
  readOnly: true
  displayInline: false
- name: parents
  type: array
  itemType: string
  displayInline: false
  required: true
- name: dependsOn
  type: array
  itemType: string
  displayInline: false
- name: blocks
  type: array
  itemType: string
  displayInline: false
- name: title
  type: string
  required: true
  displayInline: true
- name: status
  type: select
  required: true
  default: needs-agent-review
  options:
  - value: needs-agent-review
    label: Needs Agent Review
    icon: rate_review
    color: '#3b82f6'
  - value: needs-human-input
    label: Needs Human Input
    icon: person
    color: '#8b5cf6'
  - value: approved-and-unstarted
    label: Approved and Unstarted
    icon: check_circle
    color: '#22c55e'
  - value: in-progress
    label: In Progress
    icon: construction
    color: '#f59e0b'
  - value: complete
    label: Complete
    icon: task_alt
    color: '#10b981'
  - value: blocked
    label: Blocked
    icon: block
    color: '#dc2626'
- name: priority
  type: select
  options:
  - value: low
    label: Low
  - value: medium
    label: Medium
  - value: high
    label: High
  - value: critical
    label: Critical
- name: owner
  type: user
- name: tags
  type: array
  itemType: string
  displayInline: false
- name: description
  type: text
  required: true
- name: onboardingArtifact
  type: string
  displayInline: false
- name: workingPaper
  type: string
  displayInline: false
- name: agentOrganization
  type: text
  displayInline: false
- name: intakeStatus
  type: select
  options:
  - value: needs-intake
    label: Needs Intake
  - value: needs-human-approval
    label: Needs Human Approval
  - value: intake-approved
    label: Intake Approved
  - value: not-applicable
    label: Not Applicable
  displayInline: true
- name: workstreamPolicy
  type: text
  displayInline: false
- name: uncertaintyPolicy
  type: text
  displayInline: false
- name: successCriteria
  type: array
  itemType: string
  required: true
- name: phases
  type: array
  itemType: string
  displayInline: false
- name: tasks
  type: array
  itemType: string
  displayInline: false
statusBarLayout:
- row:
  - field: status
    width: 200
- row:
  - field: owner
    width: 200
  - field: tags
    width: auto
inlineTemplate: '{icon} {title} {status} {owner}'
tableView:
  defaultColumns:
  - title
  - status
  - owner
  filterable: true
  exportable: true
roles:
  title: title
  workflowStatus: status
  tags: tags
